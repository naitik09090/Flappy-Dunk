<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Flappy Dunk - Basketball Edition</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Flappy Dunk - An addictive arcade game where you tap to flap your bird and dunk through hoops. Challenge your high score now!" />
  <meta name="theme-color" content="#ff6b35" />

  <!-- Performance Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- Optimized Google Fonts Loading -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" />

  <style>
    :root {
      --primary: #ff6b35;
      --primary-dark: #e55a25;
      --secondary: #ffd700;
      --accent: #00d4ff;
      --bg-dark: #0a0a1a;
      --bg-mid: #1a1a3e;
      --bg-light: #2d2d6b;
      --text-glow: 0 0 10px rgba(255, 107, 53, .8), 0 0 20px rgba(255, 107, 53, .4);
      --score-glow: 0 0 15px rgba(255, 215, 0, .9), 0 0 30px rgba(255, 215, 0, .5);
      --border-glow: 0 0 10px rgba(0, 212, 255, .6)
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Exo 2', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none
    }

    #root {
      width: 100%;
      height: 100%
    }

    .game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .game-canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: pointer
    }

    .shake {
      animation: screenShake .4s ease-in-out
    }

    @keyframes screenShake {

      0%,
      100% {
        transform: translate(0, 0) rotate(0)
      }

      10% {
        transform: translate(-8px, -4px) rotate(-1deg)
      }

      20% {
        transform: translate(8px, 4px) rotate(1deg)
      }

      30% {
        transform: translate(-6px, 6px) rotate(.5deg)
      }

      40% {
        transform: translate(6px, -6px) rotate(-.5deg)
      }

      50% {
        transform: translate(-4px, 4px) rotate(.3deg)
      }

      60% {
        transform: translate(4px, -4px) rotate(-.3deg)
      }

      70% {
        transform: translate(-3px, 3px) rotate(.2deg)
      }

      80% {
        transform: translate(3px, -3px) rotate(-.2deg)
      }

      90% {
        transform: translate(-2px, 2px) rotate(.1deg)
      }
    }

    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10
    }

    .ui-overlay>* {
      pointer-events: all
    }

    .game-hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 110;
      pointer-events: none
    }

    .game-hud>* {
      pointer-events: all
    }

    .score-display {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px
    }

    .score-number {
      font-family: Orbitron, monospace;
      font-size: clamp(3.5rem, 12vw, 6.5rem);
      font-weight: 1000;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 255, 255, .4), 0 0 40px rgba(255, 215, 0, .2);
      line-height: 1;
      letter-spacing: 4px;
      animation: scorePop .3s cubic-bezier(.175, .885, .32, 1.275)
    }

    @keyframes scorePop {
      0% {
        transform: scale(.8);
        opacity: .5
      }

      50% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #ff6b35, #ff3d00);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .85rem;
      font-weight: 700;
      margin-top: 4px;
      box-shadow: 0 0 12px rgba(255, 107, 53, .6);
      animation: streakPulse .5s ease-in-out
    }

    @keyframes streakPulse {
      0% {
        transform: scale(.8)
      }

      50% {
        transform: scale(1.2)
      }

      100% {
        transform: scale(1)
      }
    }

    .pause-btn {
      background: rgba(255, 255, 255, .1);
      border: 2px solid rgba(255, 255, 255, .2);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: all;
      backdrop-filter: blur(8px);
      transition: all .2s;
      font-size: 1rem
    }

    .pause-btn:hover {
      background: rgba(255, 255, 255, .2);
      transform: scale(1.05)
    }

    .swish-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Orbitron, monospace;
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      color: gold;
      text-shadow: 0 0 20px rgba(255, 215, 0, .9), 0 0 40px rgba(255, 165, 0, .6);
      animation: swishAnim 1.2s ease-out forwards;
      pointer-events: none;
      z-index: 50;
      white-space: nowrap
    }

    @keyframes swishAnim {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.3) rotate(-10deg)
      }

      20% {
        opacity: 1;
        transform: translate(-50%, -60%) scale(1.2) rotate(3deg)
      }

      60% {
        opacity: 1;
        transform: translate(-50%, -70%) scale(1) rotate(0)
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -100%) scale(.8) rotate(-5deg)
      }
    }

    .combo-text {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: Orbitron, monospace;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 700;
      color: #ff6b35;
      text-shadow: 0 0 15px rgba(255, 107, 53, .8);
      animation: comboAnim 1s ease-out forwards;
      pointer-events: none;
      z-index: 45
    }

    @keyframes comboAnim {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(0) scale(.5)
      }

      30% {
        opacity: 1;
        transform: translateX(-50%) translateY(-20px) scale(1.1)
      }

      70% {
        opacity: 1;
        transform: translateX(-50%) translateY(-40px) scale(1)
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-80px) scale(.8)
      }
    }

    .start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(circle at center, #1a1a3e 0, #0a0a1a 100%);
      animation: fadeIn .8s ease-out;
      overflow: hidden;
      z-index: 30
    }

    .start-screen::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(255, 107, 53, .05) 120deg, transparent 180deg);
      animation: rotateRays 15s linear infinite;
      pointer-events: none;
      z-index: -1
    }

    @keyframes rotateRays {
      from {
        transform: rotate(0)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .glass-hub {
      background: rgba(255, 255, 255, 0.05); /* Added slight background for better legibility with less blur */
      backdrop-filter: blur(12px); /* Reduced from 25px to prevent forced reflows */
      border-radius: 48px;
      padding: 60px 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 45px;
      margin-bottom: 25px;
      position: relative;
      z-index: 2;
      animation: hubSlideUp .7s cubic-bezier(.16, 1, .3, 1)
    }

    @media (max-width:480px) {
      .glass-hub {
        padding: 35px 15px !important;
        gap: 30px !important
      }

      .game-logo {
        margin-bottom: 0 !important;
        transform: scale(1)
      }

      .logo-title {
        font-size: 2.8rem !important
      }

      .logo-subtitle {
        display: inline-block !important
      }

      .tap-hint {
        display: flex !important
      }

      .hub-header {
        margin-bottom: 0;
        padding-bottom: 15px !important;
        border-bottom: 1px solid rgba(255, 255, 255, .1) !important
      }
    }

    .hub-header {
      border-bottom: 2px solid rgba(255, 255, 255, .05);
      padding-bottom: 25px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px
    }

    .logo-title {
      font-family: Orbitron, sans-serif;
      font-size: 3.2rem;
      font-weight: 1000;
      color: #fff;
      letter-spacing: 5px;
      line-height: .9;
      text-transform: uppercase;
      text-shadow: 0 5px 20px rgba(255, 140, 66, .5);
      margin: 0
    }

    .logo-subtitle {
      font-size: .75rem;
      color: #00d4ff;
      font-weight: 850;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: rgba(0, 212, 255, .1);
      padding: 4px 12px;
      border-radius: 10px
    }

    .best-score-card {
      background: rgba(255, 215, 0, .1);
      border: 1px solid rgba(255, 215, 0, .3);
      border-radius: 16px;
      padding: 12px 32px;
      text-align: center;
      margin-bottom: 24px;
      backdrop-filter: blur(10px)
    }

    .best-score-label {
      color: rgba(255, 215, 0, .7);
      font-size: .7rem;
      letter-spacing: 4px;
      text-transform: uppercase
    }

    .best-score-number {
      font-family: Orbitron, monospace;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 900;
      color: gold;
      text-shadow: var(--score-glow)
    }

    .start-btn {
      background: linear-gradient(135deg, #ff6b35 0, #ff3d00 100%);
      border: none;
      color: #fff;
      font-family: Orbitron, monospace;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 8px 32px rgba(255, 107, 53, .5), 0 0 20px rgba(255, 61, 0, .4);
      animation: buttonPulse 2s ease-in-out infinite;
      transition: all .2s;
      margin-bottom: 24px
    }

    .start-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 40px rgba(255, 107, 53, .7), 0 0 30px rgba(255, 61, 0, .6)
    }

    .start-btn:active {
      transform: translateY(1px) scale(.97)
    }

    @keyframes buttonPulse {

      0%,
      100% {
        box-shadow: 0 8px 32px rgba(255, 107, 53, .5), 0 0 0 0 rgba(255, 107, 53, .4)
      }

      50% {
        box-shadow: 0 8px 32px rgba(255, 107, 53, .5), 0 0 0 12px rgba(255, 107, 53, 0)
      }
    }

    .tap-hint {
      color: rgba(255, 255, 255, .5);
      font-size: .85rem;
      letter-spacing: 2px;
      animation: fadeInOut 2s ease-in-out infinite
    }

    @keyframes fadeInOut {

      0%,
      100% {
        opacity: .3
      }

      50% {
        opacity: .9
      }
    }

    .how-to-play {
      display: flex;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      flex-wrap: nowrap;
      margin-top: 20px
    }

    .how-item {
      background: rgba(255, 255, 255, .02);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, .05);
      border-radius: 16px;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      transition: all .2s;
      cursor: default
    }

    .how-item:hover {
      background: rgba(255, 255, 255, .1);
      transform: translateY(-3px)
    }

    .how-icon {
      font-size: 1.5rem
    }

    .how-text {
      color: rgba(255, 255, 255, .6);
      font-size: .7rem;
      text-align: center;
      letter-spacing: 1px
    }

    .skin-selector {
      margin: 16px 0
    }

    .skin-selector-title {
      color: rgba(255, 255, 255, .7);
      font-size: .75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px
    }

    .skin-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center
    }

    .skin-selector {
      margin-top: 15px;
      width: 100%
    }

    .category-back-header {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center
    }

    .cat-back-btn {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .2);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all .2s
    }

    .cat-back-btn:hover {
      background: rgba(255, 255, 255, .2);
      transform: translateX(-3px)
    }

    .category-item {
      position: relative;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1)
    }

    .skin-label-mini {
      font-size: .6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
      color: rgba(255, 255, 255, .6)
    }

    .variants-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ff3d00;
      color: #fff;
      font-size: .55rem;
      font-weight: 900;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, .3)
    }

    .skin-item {
      position: relative;
      width: 64px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all .25s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-direction: column
    }

    .skin-item.selected {
      border-color: gold;
      box-shadow: 0 0 15px rgba(255, 215, 0, .6);
      transform: scale(1.1)
    }

    .skin-item.locked {
      cursor: not-allowed;
      filter: grayscale(.8) brightness(.5)
    }

    .skin-item .lock-icon {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: rgba(0, 0, 0, .8);
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .55rem
    }

    .skin-item .unlock-score {
      position: absolute;
      bottom: -18px;
      font-size: .55rem;
      color: rgba(255, 255, 255, .5);
      white-space: nowrap
    }

    .gameover-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      background: radial-gradient(circle at center, rgba(15, 10, 30, .98), #050514);
      backdrop-filter: blur(10px); /* Reduced from 20px */
      padding: 30px;
      animation: fadeInDown .6s cubic-bezier(.16, 1, .3, 1)
    }

    .gameover-header {
      text-align: center;
      margin-bottom: 30px
    }

    .new-best-crown {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 20px gold);
      animation: crownJump 1.5s ease-in-out infinite;
      margin-bottom: 5px
    }

    @keyframes crownJump {

      0%,
      100% {
        transform: translateY(0) scale(1) rotate(-5deg)
      }

      50% {
        transform: translateY(-15px) scale(1.1) rotate(5deg)
      }
    }

    .gameover-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      opacity: .8
    }

    .gameover-title {
      font-family: Orbitron, sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 1000;
      color: #fff;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 25px rgba(255, 61, 0, .6);
      margin: 0
    }

    .stars-display {
      display: flex;
      gap: 20px;
      margin-bottom: 40px
    }

    .star-slot {
      position: relative;
      font-size: 2.22rem;
      filter: grayscale(1) opacity(.3);
      transform: scale(.8);
      transition: all .5s cubic-bezier(.175, .885, .32, 1.275)
    }

    .star-slot.filled {
      filter: grayscale(0) opacity(1);
      transform: scale(1.1);
      filter: drop-shadow(0 0 15px gold)
    }

    .star-flare {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #fff, transparent 70%);
      transform: translate(-50%, -50%);
      animation: flareAnim 2s infinite;
      z-index: -1
    }

    @keyframes flareAnim {
      0% {
        transform: translate(-50%, -50%) scale(.5);
        opacity: 0
      }

      50% {
        opacity: .4
      }

      100% {
        transform: translate(-50%, -50%) scale(2);
        opacity: 0
      }
    }

    .bento-results {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
      animation: fadeIn .8s ease;
      animation-delay: .3s;
      animation-fill-mode: both
    }

    .bento-item {
      background: rgba(255, 255, 255, .03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 28px;
      padding: 24px;
      transition: all .3s
    }

    .mini-card {
      flex: 1;
      padding: 20px !important
    }

    .mini-card.highlight {
      background: rgba(255, 107, 53, .05);
      border-color: rgba(255, 107, 53, .2)
    }

    .result-row {
      display: flex;
      gap: 16px;
      width: 100%
    }

    .bento-label {
      color: rgba(255, 255, 255, .4);
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .bento-value {
      font-family: Orbitron, monospace;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff
    }

    .bento-value.large {
      font-size: 4rem;
      line-height: 1
    }

    .bento-value.is-best {
      color: gold;
      text-shadow: 0 0 20px rgba(255, 215, 0, .4)
    }

    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 440px
    }

    .btn-play-again {
      width: 100%;
      padding: 24px;
      background: linear-gradient(135deg, #ff6b35, #ff3d00);
      border: none;
      border-radius: 24px;
      color: #fff;
      font-family: Orbitron, sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(255, 61, 0, .4), 0 0 0 0 rgba(255, 107, 53, .4);
      transition: all .2s;
      animation: buttonReady .4s cubic-bezier(.175, .885, .32, 1.275) both;
      animation-delay: .6s
    }

    @keyframes buttonReady {
      from {
        transform: scale(.8);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    .btn-play-again:hover {
      transform: scale(1.03) translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 61, 0, .6)
    }

    .btn-home-outline {
      width: 100%;
      padding: 20px;
      background: rgba(255, 255, 255, .02);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 24px;
      color: rgba(255, 255, 255, .6);
      font-family: Orbitron, sans-serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all .2s
    }

    .btn-home-outline:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff;
      border-color: rgba(255, 255, 255, .3)
    }

    .pause-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, .85);
      backdrop-filter: blur(15px);
      z-index: 1500;
      animation: fadeIn .3s ease
    }

    .pause-card {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 32px;
      padding: 50px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .4);
      animation: hubSlideUp .5s cubic-bezier(.16, 1, .3, 1)
    }

    @keyframes hubSlideUp {
      from {
        transform: translateY(40px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .pause-title-area {
      margin-bottom: 40px
    }

    .pause-icon-big {
      font-size: 3rem;
      margin-bottom: 10px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, .5));
      animation: neonPulse 2s infinite ease-in-out
    }

    @keyframes neonPulse {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 5px #fff)
      }

      50% {
        transform: scale(1.1);
        filter: drop-shadow(0 0 20px #00d4ff)
      }
    }

    .pause-card h2 {
      font-family: Orbitron, sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 6px;
      margin: 0;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(255, 255, 255, .3)
    }

    .pause-btn-list {
      display: flex;
      flex-direction: column;
      gap: 18px
    }

    .pause-btn-list button {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      font-family: Orbitron, sans-serif;
      font-size: .9rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s cubic-bezier(.175, .885, .32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .pause-btn-resume {
      background: linear-gradient(135deg, #00d4ff, #0056b3);
      border: none;
      color: #fff;
      box-shadow: 0 10px 20px rgba(0, 212, 255, .3)
    }

    .pause-btn-resume:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 30px rgba(0, 212, 255, .5)
    }

    .pause-btn-secondary {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      color: #fff
    }

    .pause-btn-secondary:hover {
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .3);
      transform: translateY(-2px)
    }

    .pause-btn-quit {
      margin-top: 10px;
      background: 0 0;
      border: none !important;
      color: rgba(255, 255, 255, .5);
      font-size: .75rem !important
    }

    .pause-btn-quit:hover {
      color: #ff4757;
      transform: none !important
    }
  </style>
</head>
