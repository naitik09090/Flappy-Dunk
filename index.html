<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Flappy Dunk - Basketball Edition</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Flappy Dunk - An addictive arcade game where you tap to flap your bird and dunk through hoops. Challenge your high score now!" />
  <meta name="theme-color" content="#ff6b35" />

  <!-- Performance Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- Optimized Google Fonts Loading -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" />

  <style>
    :root {
      --bg-dark: #0a0a1a;
      --primary: #ff6b35;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      background: #0a0a1a;
      background: radial-gradient(circle at center, #1a1a3e 0%, #0a0a1a 100%);
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .initial-load {
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 0.8;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-load">Loading Flappy Dunk...</div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
