<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Flappy Dunk - An addictive arcade game where you tap to flap your bird and dunk through hoops. Challenge your high score now!" />
  <meta name="theme-color" content="#ff6b35" />

  <!-- Performance Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet" />

  <style>
    /* Critical CSS for initial paint */
    :root {
      --bg-dark: #0a0a1a;
      --primary: #ff6b35;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      background: #0a0a1a;
      background: radial-gradient(circle at center, #1a1a3e 0%, #0a0a1a 100%);
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Exo 2', sans-serif;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    /* Prevent FOUC (Flash of Unstyled Content) for the most basic layout */
    .game-wrapper {
      background: #0a0a1a;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
